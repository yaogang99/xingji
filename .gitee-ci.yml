# .gitee-ci.yml - Gitee CI 配置
# 打包 Windows、macOS、Linux 桌面应用

stages:
  - install
  - build
  - package

variables:
  NODE_VERSION: "18"
  ELECTRON_CACHE: "$CI_PROJECT_DIR/.cache/electron"
  ELECTRON_BUILDER_CACHE: "$CI_PROJECT_DIR/.cache/electron-builder"

# 安装依赖
install:
  stage: install
  image: node:$NODE_VERSION
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .cache/
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# 构建应用
build:
  stage: build
  image: node:$NODE_VERSION
  dependencies:
    - install
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# 打包 Windows (使用 electron-builder)
package-windows:
  stage: package
  image: electronuserland/builder:wine
  dependencies:
    - install
    - build
  script:
    - npm run electron:package -- --win
  artifacts:
    name: "star-trade-station-windows-${CI_COMMIT_SHORT_SHA}"
    paths:
      - out/make/*.exe
      - out/make/*.zip
    expire_in: 30 days
  only:
    - main
    - master

# 打包 Linux
package-linux:
  stage: package
  image: electronuserland/builder
  dependencies:
    - install
    - build
  script:
    - npm run electron:package -- --linux
  artifacts:
    name: "star-trade-station-linux-${CI_COMMIT_SHORT_SHA}"
    paths:
      - out/make/*.deb
      - out/make/*.rpm
      - out/make/*.AppImage
    expire_in: 30 days
  only:
    - main
    - master

# 打包 macOS (需要 macOS runner)
package-macos:
  stage: package
  tags:
    - macos
  dependencies:
    - install
    - build
  script:
    - npm run electron:package -- --mac
  artifacts:
    name: "star-trade-station-macos-${CI_COMMIT_SHORT_SHA}"
    paths:
      - out/make/*.dmg
      - out/make/*.zip
    expire_in: 30 days
  only:
    - main
    - master
  allow_failure: true
