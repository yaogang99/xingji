# Gitee Go 流水线配置
# 打包 Windows 桌面应用

image: electronuserland/builder:wine

stages:
  - install
  - build
  - package

# 安装依赖
install:
  stage: install
  script:
    - npm ci --registry=https://registry.npmmirror.com
  cache:
    key: node_modules_${CI_COMMIT_SHA}
    paths:
      - node_modules/

# 构建
build:
  stage: build
  script:
    - npm run build
  artifacts:
    name: build_${CI_COMMIT_SHA}
    paths:
      - dist/
      - node_modules/

# 打包 Windows
package-windows:
  stage: package
  script:
    - npm run electron:package -- --platform=win32 --arch=x64
  artifacts:
    name: star-trade-station-windows-${CI_COMMIT_SHORT_SHA}
    paths:
      - out/make/
    expire_in: 30 days
