name: Build Release

on:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - run: npm ci
      
      - run: npm run build
      
      - run: npx electron-builder --win portable
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
