appId: com.startrade.station
productName: 星际贸易站
copyright: Copyright © 2026

# 打包配置
files:
  - dist/**/*
  - electron/**/*
  - package.json

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  
# NSIS 安装程序配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 星际贸易站

# macOS 配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.games

# Linux 配置  
linux:
  target:
    - AppImage
    - deb
  category: Game

# asar 配置
asar: true

# 发布配置（暂不使用）
publish: null

# 输出目录
directories:
  output: dist_electron
  buildResources: build
